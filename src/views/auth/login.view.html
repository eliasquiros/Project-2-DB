<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Sistema AIR</title>
    <link rel="stylesheet" href="/shared/global.css">
</head>
<body>

<div class="login-pagina">
    <div class="login-tarjeta">

        <div class="login-titulo">
            <h1>Sistema AIR</h1>
            <p>Asamblea Institucional Representativa</p>
            <p>Instituto Tecnológico de Costa Rica</p>
        </div>

        <div id="alerta-error" class="alerta alerta-error"></div>

        <div class="form-grupo">
            <label for="username">Usuario</label>
            <input type="text" id="username" placeholder="Ingrese su usuario" required />
        </div>

        <div class="form-grupo">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Ingrese su contraseña" required />
        </div>

        <div class="form-acciones" style="border-top: none; margin-top: 0.5rem;">
            <button id="btn-login" class="btn btn-primario" style="width: 100%; justify-content: center;">
                Ingresar
            </button>
        </div>

        <p style="text-align:center; margin-top: 1rem; font-size: 0.8rem; color: var(--color-texto-suave);">
            Sistema de Gestión Legislativa — Uso institucional exclusivo
        </p>

    </div>
</div>

<script>
    document.getElementById('btn-login').addEventListener('click', async () => {
        const username = document.getElementById('username').value.trim()
        const password = document.getElementById('password').value
        const alerta   = document.getElementById('alerta-error')

        alerta.classList.remove('visible')

        if (!username || !password) {
            alerta.textContent = 'Usuario y contraseña son obligatorios.'
            alerta.classList.add('visible')
            return
        }

        try {
            const respuesta = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })

            const datos = await respuesta.json()

            if (respuesta.ok) {
                localStorage.setItem('token', datos.token)
                localStorage.setItem('rol', datos.rol)
                window.location.href = '../asambleistas/asambleista-lista.view.html'
            } else {
                alerta.textContent = datos.error || 'Credenciales incorrectas.'
                alerta.classList.add('visible')
            }
        } catch {
            alerta.textContent = 'Error de conexión con el servidor.'
            alerta.classList.add('visible')
        }
    })

    // Permitir login con Enter
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('btn-login').click()
    })
</script>

</body>
</html>
