<style>
#navbar-air {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: #1a2b4a;
    color: white;
    padding: 0 24px;

.nav-marca {
    display: flex;
    align-items: center;

    background-color: #2e5fa3;

    font-weight: bold;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 14px;
}

.nav-titulo strong {
    display: block;
    font-size: 14px;
}

    font-size: 11px;
    color: #aac4e8;
}

.nav-links {
    display: flex;
    list-style: none;
    margin: 0;
    padding: 0;
    gap: 4px;
    flex: 1;
    justify-content: center;
}

.nav-links .nav-item {
    display: none; /* oculto por defecto, JS lo muestra según rol */
}

.nav-links a {
    color: #cce0ff;
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 4px;

    transition: background 0.2s;

    background-color: #2e5fa3;

}

    display: flex;
    align-items: center;

}

    background-color: #c0392b;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

.nav-usuario button:hover {
    background-color: #e74c3c;
}
</style>

<script>
(function() {
    const rol = localStorage.getItem('rol')
    const username = localStorage.getItem('username')

    // Si no hay sesión activa, redirigir al login
    if (!rol || !localStorage.getItem('token')) {
        window.location.href = '/auth/login.view.html'
        return
    }

    // Mostrar nombre de usuario
    const spanUsuario = document.getElementById('nav-nombre-usuario')
    if (spanUsuario && username) {
        spanUsuario.textContent = username
    }

    // Mostrar los ítems según el rol
    const rolClass = 'rol-' + rol.toLowerCase()
    const items = document.querySelectorAll('.nav-item')
    items.forEach(item => {
        if (item.classList.contains(rolClass)) {
            item.style.display = 'list-item'
        }
    })
})()

function cerrarSesion() {
    localStorage.removeItem('token')
    localStorage.removeItem('rol')
    localStorage.removeItem('username')
    window.location.href = '/auth/login.view.html'
}
</script>
