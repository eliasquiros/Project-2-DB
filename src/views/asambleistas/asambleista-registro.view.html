<!DOCTYPE html>
<html lang="es">
<head><script src="/shared/auth.js"></script>
    <link rel="stylesheet" href="/shared/global.css">
    <meta charset="UTF-8">
    <title>Registro de Asambleísta - Sistema AIR</title>
</head>
<body>
<div id="navbar-container"></div>
<script>
fetch('/shared/navbar.view.html')
    .then(r => r.text())
    .then(html => {
        document.getElementById('navbar-container').innerHTML = html
        const rol = localStorage.getItem('rol')
        const username = localStorage.getItem('username')
        if (!rol || !localStorage.getItem('token')) {
            window.location.href = '/auth/login.view.html'
            return
        }
        const spanUsuario = document.getElementById('nav-nombre-usuario')
        if (spanUsuario && username) spanUsuario.textContent = username
        const rolClass = 'rol-' + rol.toLowerCase()
        document.querySelectorAll('.nav-item').forEach(item => {
            if (item.classList.contains(rolClass)) item.style.display = 'list-item'
        })
    })
</script>
    <h1 id="titulo-formulario">Nuevo Asambleísta</h1>

    <form id="formulario-asambleista">
        <div>
            <label for="cedula">Cédula</label>
            <input type="text" id="cedula" placeholder="0-0000-0000" required />
        </div>

        <div>
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" required />
        </div>

        <div>
            <label for="correo">Correo institucional</label>
            <input type="email" id="correo" placeholder="usuario@tec.ac.cr" />
        </div>

        <div id="campo-razon" style="display:none">
            <label for="razon">Razón del cambio</label>
            <input type="text" id="razon" />
        </div>

        <button type="submit" id="btn-guardar">Guardar</button>
        <button type="button" onclick="window.location.href='asambleista-lista.view.html'">Cancelar</button>
    </form>
     <script>
        const token = localStorage.getItem('token')

        const res = await fetch('/api/reglamentos', {
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        })
        const params = new URLSearchParams(window.location.search)
        const id = params.get('id')

        async function cargarAsambleista(id) {
            const respuesta = await fetch(`/api/asambleistas/${id}`)
            const datos = await respuesta.json()

            document.getElementById('titulo-formulario').textContent = 'Editar Asambleísta'
            document.getElementById('cedula').value = datos.cedula
            document.getElementById('nombre').value = datos.nombre
            document.getElementById('correo').value = datos.correo_institucional || ''
            document.getElementById('campo-razon').style.display = 'block'
        }

        if (id) {
            cargarAsambleista(id)
        }

        document.getElementById('formulario-asambleista').addEventListener('submit', async function (e) {
            e.preventDefault()

            const cedula = document.getElementById('cedula').value
            const nombre = document.getElementById('nombre').value
            const correo = document.getElementById('correo').value
            const razon = document.getElementById('razon').value

            const datos = { cedula, nombre, correo_institucional: correo, razon_cambio: razon }

            const respuesta = id
                ? await fetch(`/api/asambleistas/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(datos) })
                : await fetch('/api/asambleistas', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(datos) })

            if (respuesta.ok) {
                window.location.href = 'asambleista-lista.view.html'
            } else {
                const error = await respuesta.json()
                alert(error.error)
            }
        })
    </script>
</body>
</html>
