<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Asambleísta - Sistema AIR</title>
</head>
<body>
    <h1 id="nombre-asambleista">Cargando...</h1>
    <p id="cedula-asambleista"></p>
    <p id="correo-asambleista"></p>

    <h2>Historial de Nombramientos</h2>

    <table id="tabla-nombramientos">
        <thead>
            <tr>
                <th>Sector</th>
                <th>Puesto</th>
                <th>Fecha Inicio</th>
                <th>Fecha Fin</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="cuerpo-nombramientos">
            <!-- Se carga dinámicamente -->
        </tbody>
    </table>

    <h2>Agregar Nombramiento</h2>

    <form id="formulario-nombramiento">
        <div>
            <label for="sector_id">Sector</label>
            <select id="sector_id" required></select>
        </div>

        <div>
            <label for="fecha_inicio">Fecha Inicio</label>
            <input type="date" id="fecha_inicio" required />
        </div>

        <div>
            <label for="fecha_fin">Fecha Fin</label>
            <input type="date" id="fecha_fin" />
        </div>

        <button type="submit">Agregar Nombramiento</button>
        <button type="button" onclick="window.location.href='asambleista-lista.view.html'">Volver</button>
    </form>
    <script>
        const params = new URLSearchParams(window.location.search)
        const id = params.get('id')

        if (!id) {
            window.location.href = 'asambleista-lista.view.html'
        }

        async function cargarDatos() {
            const respuesta = await fetch(`/api/asambleistas/${id}/nombramientos`)
            const datos = await respuesta.json()

            document.getElementById('nombre-asambleista').textContent = datos.asambleista.nombre
            document.getElementById('cedula-asambleista').textContent = `Cédula: ${datos.asambleista.cedula}`
            document.getElementById('correo-asambleista').textContent = `Correo: ${datos.asambleista.correo_institucional || 'No registrado'}`

            const cuerpo = document.getElementById('cuerpo-nombramientos')
            cuerpo.innerHTML = ''

            datos.nombramientos.forEach(n => {
                const fila = `
                    <tr>
                        <td>${n.sector}</td>
                        <td>${n.puesto || 'No asignado'}</td>
                        <td>${n.fecha_inicio}</td>
                        <td>${n.fecha_fin || 'Indefinido'}</td>
                        <td>${n.estado}</td>
                    </tr>
                `
                cuerpo.innerHTML += fila
            })
        }

        async function cargarSectores() {
            const respuesta = await fetch('/api/catalogos/sectores')
            const sectores = await respuesta.json()

            const select = document.getElementById('sector_id')
            sectores.forEach(s => {
                const opcion = document.createElement('option')
                opcion.value = s.id_item
                opcion.textContent = s.nombre
                select.appendChild(opcion)
            })
        }

        document.getElementById('formulario-nombramiento').addEventListener('submit', async function (e) {
            e.preventDefault()

            const datos = {
                sector_id: document.getElementById('sector_id').value,
                fecha_inicio: document.getElementById('fecha_inicio').value,
                fecha_fin: document.getElementById('fecha_fin').value || null
            }

            const respuesta = await fetch(`/api/asambleistas/${id}/nombramientos`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            })

            if (respuesta.ok) {
                cargarDatos()
                document.getElementById('formulario-nombramiento').reset()
            } else {
                const error = await respuesta.json()
                alert(error.error)
            }
        })

        cargarDatos()
        cargarSectores()
    </script>
</body>
</html>
